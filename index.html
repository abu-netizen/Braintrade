<!-- Brain Trade Google Sheet Connection -->
<script>
(function () {
  const GOOGLE_SCRIPT_URL =
    "https://script.google.com/macros/s/AKfycbwkfc2FDEisC1DeS5lpywWM3iJA9wbGyIMC8litqBRH5Gu1X97euir2jLgO0lWBlnnfuA/exec";

  const CONSENT_TEXT =
    "This contact information will be used by Brain Trade to contact you regarding your enquiry.";

  function getUtm(name) {
    const params = new URLSearchParams(window.location.search);
    return params.get(name) || "";
  }

  function getFieldValue(form, names, fallbackSelectors) {
    for (let i = 0; i < names.length; i++) {
      const field = form.elements[names[i]];

      if (field && field.value !== undefined && String(field.value).trim() !== "") {
        return String(field.value).trim();
      }
    }

    for (let j = 0; j < fallbackSelectors.length; j++) {
      const fallbackField = form.querySelector(fallbackSelectors[j]);

      if (
        fallbackField &&
        fallbackField.value !== undefined &&
        String(fallbackField.value).trim() !== ""
      ) {
        return String(fallbackField.value).trim();
      }
    }

    return "";
  }

  function setButtonText(button, text) {
    if (!button) return;

    if (button.tagName === "INPUT") {
      button.value = text;
    } else {
      button.textContent = text;
    }
  }

  function getButtonText(button) {
    if (!button) return "";

    if (button.tagName === "INPUT") {
      return button.value;
    }

    return button.textContent;
  }

  function showThankYouPopup() {
    let popup = document.getElementById("braintrade-thank-you-popup");

    if (!popup) {
      popup = document.createElement("div");
      popup.id = "braintrade-thank-you-popup";

      popup.innerHTML = `
        <div class="braintrade-thank-you-box">
          <button type="button" class="braintrade-thank-you-close">×</button>
          <h2>Thank you for registering.</h2>
          <p>Your information has been received. One of our executives will reach out to you shortly.</p>
        </div>
      `;

      document.body.appendChild(popup);

      const style = document.createElement("style");
      style.innerHTML = `
        #braintrade-thank-you-popup {
          position: fixed;
          inset: 0;
          z-index: 999999;
          display: flex;
          align-items: center;
          justify-content: center;
          background: rgba(7, 16, 35, 0.72);
          backdrop-filter: blur(10px);
          padding: 20px;
        }

        .braintrade-thank-you-box {
          width: min(460px, 94vw);
          background: #ffffff;
          color: #081f4d;
          border-radius: 24px;
          padding: 34px 30px;
          box-shadow: 0 24px 80px rgba(8, 31, 77, 0.22);
          position: relative;
          text-align: center;
          font-family: Inter, Arial, sans-serif;
        }

        .braintrade-thank-you-box h2 {
          margin: 0 0 12px;
          font-size: 26px;
          line-height: 1.2;
          font-weight: 600;
          letter-spacing: -0.03em;
        }

        .braintrade-thank-you-box p {
          margin: 0;
          font-size: 16px;
          line-height: 1.6;
          color: #475569;
        }

        .braintrade-thank-you-close {
          position: absolute;
          top: 12px;
          right: 14px;
          width: 34px;
          height: 34px;
          border: 0;
          border-radius: 50%;
          background: #eef4ff;
          color: #081f4d;
          font-size: 24px;
          line-height: 1;
          cursor: pointer;
        }
      `;

      document.head.appendChild(style);

      popup
        .querySelector(".braintrade-thank-you-close")
        .addEventListener("click", function () {
          popup.style.display = "none";
        });
    }

    popup.style.display = "flex";
  }

  function submitLead(form) {
    const name = getFieldValue(
      form,
      ["name", "full_name", "fullName"],
      ['input[autocomplete="name"]', 'input[placeholder*="Name"]', 'input[placeholder*="name"]', 'input[type="text"]']
    );

    const email = getFieldValue(
      form,
      ["email", "email_address", "emailAddress"],
      ['input[type="email"]', 'input[placeholder*="Email"]', 'input[placeholder*="email"]']
    );

    const phone = getFieldValue(
      form,
      ["phone", "phone_no", "phoneNo", "phone_number", "phoneNumber"],
      ['input[type="tel"]', 'input[placeholder*="Phone"]', 'input[placeholder*="phone"]']
    );

    const investorProfile = getFieldValue(
      form,
      ["investor_profile", "investorProfile", "profile"],
      ["select"]
    );

    const payload = new URLSearchParams();

    payload.append("form_source", form.getAttribute("data-form-source") || "Website Form");
    payload.append("name", name);
    payload.append("email", email);
    payload.append("phone", phone);
    payload.append("investor_profile", investorProfile);

    payload.append("page_name", "Brain Trade");
    payload.append("page_url", window.location.href);

    payload.append("utm_source", getUtm("utm_source"));
    payload.append("utm_medium", getUtm("utm_medium"));
    payload.append("utm_campaign", getUtm("utm_campaign"));
    payload.append("utm_term", getUtm("utm_term"));
    payload.append("utm_content", getUtm("utm_content"));

    payload.append("consent_text", CONSENT_TEXT);
    payload.append("user_agent", navigator.userAgent);

    return fetch(GOOGLE_SCRIPT_URL, {
      method: "POST",
      mode: "no-cors",
      body: payload
    });
  }

  document.addEventListener(
    "submit",
    function (event) {
      const form = event.target;

      if (!form || form.tagName !== "FORM") {
        return;
      }

      const hasEmail = form.querySelector('input[type="email"], input[name="email"]');
      const hasPhone = form.querySelector('input[type="tel"], input[name="phone"], input[name="phone_number"]');

      if (!hasEmail && !hasPhone) {
        return;
      }

      event.preventDefault();
      event.stopImmediatePropagation();

      const submitButton = form.querySelector('button[type="submit"], input[type="submit"]');
      const oldButtonText = getButtonText(submitButton);

      if (submitButton) {
        submitButton.disabled = true;
        setButtonText(submitButton, "Submitting...");
      }

      submitLead(form)
        .then(function () {
          showThankYouPopup();
          form.reset();
        })
        .catch(function (error) {
          console.log("Brain Trade lead submit error:", error);
          showThankYouPopup();
          form.reset();
        })
        .finally(function () {
          setTimeout(function () {
            if (submitButton) {
              submitButton.disabled = false;
              setButtonText(submitButton, oldButtonText || "Register");
            }
          }, 1200);
        });
    },
    true
  );
})();
</script>
